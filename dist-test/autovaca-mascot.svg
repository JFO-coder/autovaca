<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="240" height="200">
  <!-- AutoVaca Mascot - Robotic Holstein Cow -->

  <!-- === BODY === Large barrel-shaped torso like a real Holstein -->
  <ellipse cx="120" cy="110" rx="70" ry="45" fill="#F0F0F0" stroke="#333" stroke-width="2"/>
  <!-- Body metallic shine -->
  <ellipse cx="110" cy="95" rx="45" ry="12" fill="white" opacity="0.3"/>

  <!-- Holstein black patches on body -->
  <ellipse cx="90" cy="100" rx="22" ry="18" fill="#1a1a1a" opacity="0.85" transform="rotate(-15 90 100)"/>
  <ellipse cx="145" cy="105" rx="25" ry="20" fill="#1a1a1a" opacity="0.85" transform="rotate(10 145 105)"/>
  <ellipse cx="115" cy="130" rx="18" ry="12" fill="#1a1a1a" opacity="0.85" transform="rotate(-5 115 130)"/>
  <circle cx="70" cy="115" r="10" fill="#1a1a1a" opacity="0.7"/>

  <!-- Rivets/bolts on body (robotic detail) -->
  <circle cx="55" cy="100" r="2.5" fill="#CCC" stroke="#999" stroke-width="0.5"/>
  <circle cx="185" cy="100" r="2.5" fill="#CCC" stroke="#999" stroke-width="0.5"/>
  <circle cx="55" cy="125" r="2.5" fill="#CCC" stroke="#999" stroke-width="0.5"/>
  <circle cx="185" cy="125" r="2.5" fill="#CCC" stroke="#999" stroke-width="0.5"/>

  <!-- Belly panel / LED screen -->
  <rect x="100" y="118" width="40" height="22" rx="5" fill="#111" stroke="#4ade80" stroke-width="1.5"/>
  <text x="120" y="134" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#4ade80">
    <tspan>US$</tspan>
  </text>

  <!-- === HEAD === Larger, more cow-like -->
  <ellipse cx="120" cy="48" rx="32" ry="28" fill="#F0F0F0" stroke="#333" stroke-width="2"/>
  <!-- Head black patch (classic Holstein asymmetric) -->
  <ellipse cx="108" cy="38" rx="18" ry="14" fill="#1a1a1a" opacity="0.85" transform="rotate(-10 108 38)"/>
  <ellipse cx="138" cy="45" rx="12" ry="10" fill="#1a1a1a" opacity="0.85" transform="rotate(5 138 45)"/>

  <!-- === SNOUT === Big pink-ish muzzle like a real cow -->
  <ellipse cx="120" cy="62" rx="20" ry="12" fill="#F5CEC7" stroke="#333" stroke-width="1.5"/>
  <!-- Nostrils - large and oval like a Holstein -->
  <ellipse cx="112" cy="61" rx="4" ry="3" fill="#333"/>
  <ellipse cx="128" cy="61" rx="4" ry="3" fill="#333"/>
  <!-- Slight smile -->
  <path d="M 112 67 Q 120 72 128 67" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>

  <!-- === EYES === LED robot eyes -->
  <ellipse cx="106" cy="42" rx="7" ry="8" fill="#111" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="134" cy="42" rx="7" ry="8" fill="#111" stroke="#333" stroke-width="1.5"/>
  <!-- Green LED glow -->
  <ellipse cx="106" cy="42" rx="4.5" ry="5.5" fill="#4ade80">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="134" cy="42" rx="4.5" ry="5.5" fill="#4ade80">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Eye highlights -->
  <circle cx="104" cy="39" r="2" fill="white" opacity="0.8"/>
  <circle cx="132" cy="39" r="2" fill="white" opacity="0.8"/>

  <!-- === HORNS === Short, curved like a dairy cow -->
  <path d="M 94 26 Q 85 12 80 8" fill="none" stroke="#E8DCC8" stroke-width="5" stroke-linecap="round"/>
  <path d="M 146 26 Q 155 12 160 8" fill="none" stroke="#E8DCC8" stroke-width="5" stroke-linecap="round"/>
  <!-- Horn tips darker -->
  <circle cx="80" cy="8" r="3" fill="#555"/>
  <circle cx="160" cy="8" r="3" fill="#555"/>

  <!-- === EARS === Floppy cow ears sticking out sideways -->
  <ellipse cx="86" cy="32" rx="14" ry="8" fill="#F0F0F0" stroke="#333" stroke-width="1.5" transform="rotate(-25 86 32)"/>
  <ellipse cx="154" cy="32" rx="14" ry="8" fill="#F0F0F0" stroke="#333" stroke-width="1.5" transform="rotate(25 154 32)"/>
  <!-- Ear inner pink -->
  <ellipse cx="86" cy="32" rx="8" ry="4.5" fill="#F5CEC7" transform="rotate(-25 86 32)"/>
  <ellipse cx="154" cy="32" rx="8" ry="4.5" fill="#F5CEC7" transform="rotate(25 154 32)"/>

  <!-- === ANTENNA === Robotic element on head -->
  <line x1="120" y1="22" x2="120" y2="6" stroke="#666" stroke-width="2.5"/>
  <circle cx="120" cy="4" r="4" fill="#4ade80">
    <animate attributeName="r" values="4;5;4" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- === LEGS === 4 sturdy legs with mechanical joints -->
  <!-- Front left -->
  <rect x="72" y="148" width="14" height="32" rx="5" fill="#F0F0F0" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="79" cy="148" rx="7" ry="4" fill="#CCC" stroke="#333" stroke-width="1"/>
  <rect x="70" y="178" width="18" height="7" rx="3" fill="#333"/>
  <!-- Holstein patch on leg -->
  <rect x="74" y="158" width="10" height="10" rx="4" fill="#1a1a1a" opacity="0.7"/>

  <!-- Front right -->
  <rect x="96" y="150" width="14" height="30" rx="5" fill="#F0F0F0" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="103" cy="150" rx="7" ry="4" fill="#CCC" stroke="#333" stroke-width="1"/>
  <rect x="94" y="178" width="18" height="7" rx="3" fill="#333"/>

  <!-- Back left -->
  <rect x="130" y="150" width="14" height="30" rx="5" fill="#F0F0F0" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="137" cy="150" rx="7" ry="4" fill="#CCC" stroke="#333" stroke-width="1"/>
  <rect x="128" y="178" width="18" height="7" rx="3" fill="#333"/>
  <!-- Holstein patch on leg -->
  <rect x="132" y="160" width="10" height="8" rx="4" fill="#1a1a1a" opacity="0.7"/>

  <!-- Back right -->
  <rect x="154" y="148" width="14" height="32" rx="5" fill="#F0F0F0" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="161" cy="148" rx="7" ry="4" fill="#CCC" stroke="#333" stroke-width="1"/>
  <rect x="152" y="178" width="18" height="7" rx="3" fill="#333"/>

  <!-- Mechanical joint circles -->
  <circle cx="79" cy="155" r="2.5" fill="#999" stroke="#666" stroke-width="0.5"/>
  <circle cx="103" cy="157" r="2.5" fill="#999" stroke="#666" stroke-width="0.5"/>
  <circle cx="137" cy="157" r="2.5" fill="#999" stroke="#666" stroke-width="0.5"/>
  <circle cx="161" cy="155" r="2.5" fill="#999" stroke="#666" stroke-width="0.5"/>

  <!-- === UDDER === Because it's a vaca! Small subtle detail -->
  <ellipse cx="120" cy="152" rx="12" ry="6" fill="#F5CEC7" stroke="#E8A0A0" stroke-width="1"/>

  <!-- === TAIL === Spring coil with Holstein tuft -->
  <path d="M 188 95 Q 200 88 198 98 Q 196 108 210 102 Q 218 98 215 108" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tail tuft -->
  <ellipse cx="216" cy="112" rx="6" ry="4" fill="#1a1a1a" transform="rotate(20 216 112)"/>

  <!-- === SUBTLE GLOW === Ground shadow -->
  <ellipse cx="120" cy="190" rx="65" ry="5" fill="#4ade80" opacity="0.08"/>
</svg>